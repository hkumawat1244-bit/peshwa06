<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do You Love Me?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="wrapper">
        <div class="question-container container">
            <img class="local-gif" src="https://share.google/DLBiXqqwjOA4QcsIM.com/media/v1.Y2lkPTc5MGI3NjExOHpueXh6eGZ6ZHg0eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/L4lvBze6S6S04P8W3h/giphy.gif" alt="Asking GIF">
            <h2 class="question">Do you love me?</h2>
            
            <div class="button-container">
                <button class="yes-btn btn js-yes-btn">Yes</button>
                <button class="no-btn btn js-no-btn">No</button>
            </div>
        </div>

        <div class="result-container container" style="display: none;">
            <img class="gif-result" src="https://share.google/DLBiXqqwjOA4QcsIM.com/media/v1.Y2lkPTc5MGI3NjExOHpueXh6eGZ6ZHg0eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/KztT2c4u8mYYUiCi7X/giphy.gif" alt="Happy GIF">
            <h2 class="result-text">I knew it! 😍</h2>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
