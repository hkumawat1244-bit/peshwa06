<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do You Love Me?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="wrapper">
        
        <div class="question-container container">
            <video class="local-gif" src="Reply me love.mp4" loop autoplay muted></video>
            <h2 class="question">Do you love me?</h2>
            
            <div class="button-container">
                <button class="yes-btn btn js-yes-btn">Yes</button>
                <button class="no-btn btn js-no-btn">No</button>
            </div>
        </div>

        <div class="result-container container" style="display: none;">
            <video class="gif-result" src="Love me.mp4" autoplay loop muted></video>
            <h2 class="result-text">I knew it! 😍</h2>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
