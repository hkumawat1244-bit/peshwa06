    <!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wingo 1-Min | Home</title>
    
    <style>
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; text-align: center; }
        .timer-box { font-size: 50px; color: #ffeb3b; margin: 20px; padding: 20px; border: 2px solid #ffeb3b; display: inline-block; border-radius: 10px; }
        .btn { background: #d32f2f; color: white; padding: 15px 30px; border: none; border-radius: 5px; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

    <h1>Wingo Lottery King</h1>
    
    <div class="timer-box">
        00:<span id="seconds">60</span>
    </div>

    <br>
    <button class="btn" onclick="testClick()">Bet Now</button>

    <script>
        // Timer Logic
        let timeLeft = 60;
        const timerDisplay = document.getElementById('seconds');

        setInterval(() => {
            if(timeLeft <= 0) {
                timeLeft = 60; // Reset timer
                alert("Time Up! New Round Starting.");
            }
            timeLeft--;
            timerDisplay.innerText = timeLeft < 10 ? '0' + timeLeft : timeLeft;
        }, 1000);

        // Click Test
        function testClick() {
            alert("JS Kaam kar raha hai!");
        }
    </script>

</body>
